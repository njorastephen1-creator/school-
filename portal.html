<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exam Portal - Student</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .header h1 { font-size: 26px; font-weight: 700; }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav-btn { background: rgba(255,255,255,0.25); border: 2px solid white; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; }
    .nav-btn:hover, .nav-btn.active { background: white; color: #f5576c; }
    .user-controls { display: flex; align-items: center; gap: 10px; }
    .content { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .view { display: none !important; }
    .view.active { display: block !important; }
    .auth-warning { background: #f5576c; color: white; padding: 20px; border-radius: 12px; margin-bottom: 24px; text-align: center; }
    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; }
    .btn-primary { background: #667eea; color: white; padding: 12px 28px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .btn-secondary { background: white; color: #667eea; border: 2px solid #667eea; padding: 12px 28px; border-radius: 12px; cursor: pointer; }
    .btn-success { background: #43e97b; color: white; padding: 12px 28px; border: none; border-radius: 12px; cursor: pointer; }
    .exam-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .exam-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 4px; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .timer { background: #f5576c; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .search-input { padding: 10px 16px; border: 2px solid #e2e8f0; border-radius: 12px; flex: 1; }
    .footer { text-align: center; padding: 24px; color: white; margin-top: 40px; }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>🎓 Exam Portal - Student</h1>
      <nav class="nav">
        <button class="nav-btn active" id="btn-exams" onclick="showView('exams')">📚 My Exams</button>
        <button class="nav-btn" id="btn-register" onclick="showView('register')">📝 Register</button>
      </nav>
      <div class="user-controls">
        <span id="user-display">🔐 Guest</span>
        <button id="student-login-btn" class="btn-success" onclick="studentLogin()">👤 Student Login</button>
      </div>
    </header>
    <main class="content">
      <div id="auth-warning" class="auth-warning" style="display:none;">
        <h3>🔐 Login Required</h3>
        <p>Please login to access exams</p>
        <div style="margin-top:16px;"><button class="btn-success" onclick="studentLogin()">👤 Student Login</button></div>
      </div>
      <section id="exams" class="view">
        <div class="toolbar">
          <input type="text" id="search-exam" placeholder="🔍 Search..." class="search-input" oninput="renderExams()"/>
        </div>
        <div id="student-exam-notice" style="background:#fef3c7;color:#92400e;padding:16px;border-radius:12px;margin-bottom:20px;display:none;">📌 You can only see exams shared via link.</div>
        <div class="exam-list" id="exam-list"></div>
      </section>
      <section id="register" class="view">
        <div class="card">
          <h3>📝 Student Registration</h3>
          <div id="exam-access-info" style="background:#e0e7ff;padding:16px;border-radius:12px;margin-bottom:20px;display:none;"><p><strong>📚 Exam:</strong> <span id="assigned-exam-name"></span></p></div>
          <form id="register-form" onsubmit="registerStudent(event)">
            <div class="form-group"><label>Full Name *</label><input type="text" id="reg-name" required/></div>
            <div class="form-group"><label>Phone *</label><input type="tel" id="reg-phone" required/></div>
            <div class="form-group"><label>Class *</label><input type="text" id="reg-class" required/></div>
            <button type="submit" class="btn-primary">✅ Register</button>
          </form>
        </div>
      </section>
      <section id="take-exam" class="view">
        <div class="card">
          <div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h3 id="take-exam-title">Exam</h3><div class="timer" id="exam-timer">⏱️ 60:00</div></div>
          <div id="exam-instructions-display" style="background:#f8fafc;padding:16px;border-radius:12px;margin-bottom:24px;"></div>
          <form id="take-exam-form" onsubmit="submitExam(event)">
            <div id="exam-questions-container"></div>
            <div class="form-group" style="margin-top:24px;"><label>💬 Testimony (Optional)</label><textarea id="exam-testimony" rows="3"></textarea></div>
            <button type="submit" class="btn-primary" style="margin-top:24px;">📤 Submit</button>
          </form>
        </div>
      </section>
      <section id="exam-result" class="view">
        <div class="card" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;text-align:center;padding:40px;">
          <h3>📊 Results</h3><h2 id="result-exam-title" style="font-size:48px;margin:20px 0;"></h2>
          <div id="result-score" style="font-size:72px;font-weight:800;"></div>
          <p id="result-marks"></p><p id="result-date"></p>
          <button class="btn-secondary" onclick="showView('exams')" style="margin-top:24px;">📚 Back</button>
        </div>
      </section>
    </main>
    <footer class="footer">© 2026 Exam Portal - Student 🎯</footer>
  </div>

  <script>
    // 🔥 NEW FIREBASE (Examination) - FOR STUDENTS
    const firebaseConfig = {
      apiKey: "AIzaSyBslORNsWS9qI4wXyBr3YpNA45bt5YYvjg",
      authDomain: "examination-dfebe.firebaseapp.com",
      databaseURL: "https://examination-dfebe-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "examination-dfebe",
      storageBucket: "examination-dfebe.firebasestorage.app",
      messagingSenderId: "191460094638",
      appId: "1:191460094638:web:f27a0087d12cd16153333f"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    const app = { currentUser: null, exams: {}, results: {}, currentExam: null, assignedExamId: null, timer: null, timeRemaining: 0, registeredStudent: null };
    const SHARED_STUDENT_EMAIL = "studentsdiscipleship@gmail.com";
    const urlParams = new URLSearchParams(window.location.search);
    const examIdFromUrl = urlParams.get('exam');
    if (examIdFromUrl) app.assignedExamId = examIdFromUrl;

    auth.onAuthStateChanged(function(user) {
      app.currentUser = user;
      if (user) {
        document.getElementById('user-display').textContent = '👤 ' + (user.email || 'User');
        document.getElementById('student-login-btn').style.display = 'none';
        const logoutBtn = document.createElement('button');
        logoutBtn.className = 'btn-danger'; logoutBtn.style.padding = '8px 16px'; logoutBtn.textContent = '🚪 Logout';
        logoutBtn.onclick = function() { auth.signOut().then(() => { location.reload(); }); };
        document.querySelector('.user-controls').appendChild(logoutBtn);
        document.getElementById('auth-warning').style.display = 'none';
        loadAllData();
        if (app.assignedExamId && !app.registeredStudent) { loadExamForRegistration(); showView('register'); }
      } else {
        document.getElementById('user-display').textContent = '🔐 Guest';
        document.getElementById('student-login-btn').style.display = 'inline-block';
        document.getElementById('auth-warning').style.display = 'block';
        app.exams = {}; app.results = {};
      }
    });

    window.studentLogin = function() {
      const email = prompt('📧 Enter your email:'); if (!email) return;
      const password = prompt('📱 Enter password:'); if (!password) return;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => { alert('✅ Login successful!'); if (app.assignedExamId) showView('register'); else showView('exams'); })
        .catch(err => {
          if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-login-credentials') {
            auth.createUserWithEmailAndPassword(email, password)
              .then(() => { alert('✅ Account created! Welcome!'); if (app.assignedExamId) showView('register'); else showView('exams'); })
              .catch(e => alert('❌ Error: ' + e.message));
          } else { alert('❌ Error: ' + err.message); }
        });
    };

    window.showView = function(viewName) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const targetView = document.getElementById(viewName);
      if (targetView) targetView.classList.add('active');
      const btn = document.getElementById('btn-' + viewName);
      if (btn) btn.classList.add('active');
      if (viewName === 'exams') { renderExams(); const notice = document.getElementById('student-exam-notice'); if (notice) notice.style.display = app.assignedExamId ? 'block' : 'none'; }
      if (viewName === 'register' && app.assignedExamId) loadExamForRegistration();
    };

    function loadExamForRegistration() { if (!app.assignedExamId) return; database.ref('exams/' + app.assignedExamId).once('value').then(snapshot => { const exam = snapshot.val(); if (exam) { document.getElementById('assigned-exam-name').textContent = exam.title; document.getElementById('exam-access-info').style.display = 'block'; } else { alert('❌ Invalid exam link'); app.assignedExamId = null; } }); }
    
    window.registerStudent = function(e) { e.preventDefault(); if (!app.currentUser) { alert('🔐 Please login first'); return; } const studentData = { name: document.getElementById('reg-name').value.trim(), phone: document.getElementById('reg-phone').value.trim(), class: document.getElementById('reg-class').value.trim(), email: app.currentUser.email || null, userId: app.currentUser.uid, registeredAt: Date.now(), assignedExamId: app.assignedExamId }; database.ref('students/' + app.currentUser.uid).set(studentData).then(() => { app.registeredStudent = studentData; alert('✅ Registration successful!'); document.getElementById('register-form').reset(); showView('exams'); }).catch(err => alert('❌ Error: ' + err.message)); };
    
    function loadAllData() { database.ref('exams').on('value', snapshot => { app.exams = snapshot.val() || {}; renderExams(); }); database.ref('results').on('value', snapshot => { app.results = snapshot.val() || {}; }); if (app.currentUser) { database.ref('students/' + app.currentUser.uid).once('value').then(snapshot => { const student = snapshot.val(); if (student) app.registeredStudent = student; }); } }
    
    window.renderExams = function() { const list = document.getElementById('exam-list'); if (!list) return; let filtered = Object.entries(app.exams); if (app.assignedExamId) filtered = filtered.filter(([id, exam]) => id === app.assignedExamId); else if (app.registeredStudent && app.registeredStudent.assignedExamId) filtered = filtered.filter(([id, exam]) => id === app.registeredStudent.assignedExamId); else if (!app.assignedExamId) filtered = []; if (filtered.length === 0) { list.innerHTML = '<p style="text-align:center;color:#718096;padding:40px;">No exams assigned. Wait for teacher link.</p>'; return; } const completedExams = Object.values(app.results).filter(r => r.userId === app.currentUser.uid).map(r => r.examId); list.innerHTML = filtered.map(([id, exam]) => { const isCompleted = completedExams.includes(id); return '<div class="exam-card"><h4>' + exam.title + '</h4><p><strong>Subject:</strong> ' + exam.subject + '</p><p><strong>Duration:</strong> ' + exam.duration + ' min</p><p><strong>Marks:</strong> ' + exam.totalMarks + '</p><p><strong>Questions:</strong> ' + (exam.questions ? exam.questions.length : 0) + '</p><span class="badge badge-active">' + exam.status.toUpperCase() + '</span>' + (isCompleted ? '<span class="badge" style="background:#d1fae5;color:#065f46;">✅ Completed</span>' : '') + (exam.status === 'active' && !isCompleted ? '<button class="btn-primary btn-sm" onclick="takeExam(\'' + id + '\')" style="margin-top:12px;width:100%;">📝 Take Exam</button>' : '') + (isCompleted ? '<button class="btn-secondary btn-sm" onclick="viewMyResult(\'' + id + '\')" style="margin-top:12px;width:100%;">📊 View Result</button>' : '') + '</div>'; }).join(''); };
    
    // 🔥 UPDATED: Matches YOUR question structure
    window.takeExam = function(examId) {
      if (!app.registeredStudent) { alert('📝 Register first!'); showView('register'); return; }
      const exam = app.exams[examId];
      if (!exam) return;
      app.currentExam = { id: examId, ...exam };
      app.timeRemaining = exam.duration * 60;
      document.getElementById('take-exam-title').textContent = exam.title;
      document.getElementById('exam-instructions-display').innerHTML = exam.instructions ? '<p><strong>Instructions:</strong> ' + exam.instructions + '</p>' : '';
      const container = document.getElementById('exam-questions-container');
      
      container.innerHTML = exam.questions.map((q, i) => {
        // Support BOTH formats (yours and standard)
        const questionText = q.text || q.question || '';
        const options = q.options || {};
        const optionKeys = Object.keys(options);
        
        return '<div class="question-card" style="background:#f8fafc;padding:20px;border-radius:12px;margin-bottom:16px;border:2px solid #e2e8f0;">' +
          '<h4>Question ' + (i + 1) + ' (' + q.marks + ' marks)</h4>' +
          '<p style="margin-bottom:16px;">' + questionText + '</p>' +
          '<ul class="options-list" style="list-style:none;">' +
          optionKeys.map((key) => {
            const value = options[key];
            return '<li style="margin:8px 0;">' +
              '<label style="display:flex;align-items:center;gap:10px;padding:10px;background:white;border-radius:8px;cursor:pointer;">' +
              '<input type="radio" name="q' + i + '" value="' + key + '"/> ' + value +
              '</label></li>';
          }).join('') +
          '</ul></div>';
      }).join('');
      
      showView('take-exam');
      startTimer();
    };
    
    function startTimer() { const timerEl = document.getElementById('exam-timer'); app.timer = setInterval(() => { app.timeRemaining--; const m = Math.floor(app.timeRemaining / 60); const s = app.timeRemaining % 60; timerEl.textContent = '⏱️ ' + m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0'); if (app.timeRemaining <= 60) timerEl.classList.add('urgent'); if (app.timeRemaining <= 0) { clearInterval(app.timer); alert('⏰ Time up!'); submitExam(null, true); } }, 1000); }
    
    // 🔥 UPDATED: Matches YOUR answer structure
    window.submitExam = function(e, autoSubmit = false) {
      if (e) e.preventDefault();
      if (!app.currentExam || !app.currentUser || !app.registeredStudent) return;
      if (!autoSubmit && !confirm('📤 Submit?')) return;
      clearInterval(app.timer);
      let score = 0, totalMarks = 0;
      const answers = {};
      
      app.currentExam.questions.forEach((q, i) => {
        const selected = document.querySelector('input[name="q' + i + '"]:checked');
        const userAnswer = selected ? selected.value : null;
        answers['q' + i] = userAnswer;
        totalMarks += q.marks;
        
        // Support BOTH answer formats (yours: answer, standard: correct)
        const correctAnswer = q.correct || q.answer || '';
        if (userAnswer == correctAnswer) score += q.marks;
      });
      
      const percentage = Math.round((score / totalMarks) * 100);
      const testimony = document.getElementById('exam-testimony').value.trim();
      const result = { examId: app.currentExam.id, examTitle: app.currentExam.title, studentEmail: app.currentUser.email || null, userId: app.currentUser.uid, studentName: app.registeredStudent.name, studentPhone: app.registeredStudent.phone, studentClass: app.registeredStudent.class, score, totalMarks, percentage, answers, submittedAt: Date.now(), autoSubmitted: autoSubmit };
      const resultId = 'result_' + app.currentUser.uid + '_' + Date.now();
      database.ref('results/' + resultId).set(result).then(() => {
        if (testimony) {
          const testimonyData = { examId: app.currentExam.id, examTitle: app.currentExam.title, studentEmail: app.currentUser.email || null, userId: app.currentUser.uid, studentName: app.registeredStudent.name, studentClass: app.registeredStudent.class, testimony, score, percentage, submittedAt: Date.now() };
          database.ref('testimonies/' + Date.now()).set(testimonyData);
        }
        document.getElementById('result-exam-title').textContent = app.currentExam.title;
        document.getElementById('result-score').textContent = percentage + '%';
        document.getElementById('result-marks').textContent = score + ' / ' + totalMarks;
        document.getElementById('result-date').textContent = '📅 ' + new Date().toLocaleString();
        showView('exam-result');
        app.currentExam = null;
      }).catch(err => alert('❌ Error: ' + err.message));
    };
    
    window.viewMyResult = function(examId) { const result = Object.values(app.results).find(r => r.examId === examId && r.userId === app.currentUser.uid); if (!result) return; document.getElementById('result-exam-title').textContent = result.examTitle; document.getElementById('result-score').textContent = result.percentage + '%'; document.getElementById('result-marks').textContent = result.score + ' / ' + result.totalMarks; document.getElementById('result-date').textContent = '📅 ' + new Date(result.submittedAt).toLocaleString(); showView('exam-result'); };
    
    window.addEventListener('DOMContentLoaded', function() { console.log('✅ Student Portal Ready!'); if (app.assignedExamId && !app.currentUser) document.getElementById('auth-warning').style.display = 'block'; });
    window.addEventListener('beforeunload', function(e) { if (app.timer) { e.preventDefault(); e.returnValue = 'Exam in progress!'; } });
  </script>
</body>
</html>
